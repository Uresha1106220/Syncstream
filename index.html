<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncStream - YouTube Watch Party</title>
  <meta name="description" content="Watch YouTube together in perfect sync with friends.">
  <link rel="stylesheet" href="style.css">
  <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
</head>
<body>
  <!-- Landing Page -->
  <div id="landing-page" class="landing-page">
    <div class="landing-content">
      <h1 class="title">SyncStream</h1>
      <p class="subtitle">Watch YouTube together in perfect sync</p>

      <!-- Auth Card -->
      <div class="auth-card" id="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab-btn active" id="login-tab-btn">Login</button>
          <button class="auth-tab-btn" id="register-tab-btn">Register</button>
        </div>

        <div id="auth-error" class="auth-error hidden"></div>

        <div class="auth-form">
          <input id="auth-username" type="text" placeholder="Username" maxlength="20" class="auth-input" autocomplete="username">
          <input id="auth-password" type="password" placeholder="Password" maxlength="50" class="auth-input" autocomplete="current-password">
          <button id="auth-submit-btn" class="btn btn-primary auth-submit">Login</button>
        </div>

        <!-- Logged in state (hidden until auth success) -->
        <div id="logged-in-info" class="logged-in-info hidden">
          <div class="logged-in-user">
            <div class="avatar-circle" id="avatar-circle">U</div>
            <span id="logged-in-name">User</span>
          </div>
          <button id="logout-btn" class="btn-logout">Logout</button>
        </div>
      </div>

      <!-- Room Actions (shown after login) -->
      <div id="room-actions" class="button-group hidden">
        <button id="create-room-btn" class="btn btn-primary">Create Room</button>
        <button id="join-room-btn" class="btn btn-secondary">Join Room</button>
      </div>

      <div id="join-modal" class="join-modal hidden">
        <input id="room-code-input" type="text" placeholder="Enter 6-digit room code" maxlength="6" class="room-input">
        <button id="join-submit-btn" class="btn btn-success">Join</button>
      </div>

      <!-- Room History (shown after login) -->
      <div id="room-history-section" class="history-section hidden">
        <h3 class="history-title">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20" style="display:inline;vertical-align:-2px;margin-right:6px"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
          Recent Rooms
        </h3>
        <div id="history-list" class="history-list"></div>
      </div>
    </div>
  </div>

  <!-- Room Page -->
  <div id="room-page" class="room-page hidden">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <h2 class="logo">SyncStream</h2>
        <div class="room-info">
          <span class="label">Room:</span>
          <span id="room-id-display" class="room-code"></span>
        </div>
      </div>

      <div class="header-right">
        <div class="sync-status">
          <div id="sync-indicator" class="sync-indicator synced"></div>
          <span id="sync-status">Synced</span>
        </div>
        <div class="user-info">
          <svg class="icon" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/>
          </svg>
          <span id="user-count">1</span>
        </div>
      </div>
    </div>

    <!-- Tab Navigation (no Games tab) -->
    <div class="tab-navigation">
      <button class="tab-btn active" data-tab="video">
        <svg class="tab-icon" fill="currentColor" viewBox="0 0 20 20">
          <path d="M2 6a2 2 0 012-2h6a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zM14.553 7.106A1 1 0 0014 8v4a1 1 0 00.553.894l2 1A1 1 0 0018 13V7a1 1 0 00-1.447-.894l-2 1z"/>
        </svg>
        Video
      </button>
      <button class="tab-btn" data-tab="chat">
        <svg class="tab-icon" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/>
        </svg>
        Chat
        <span id="unread-badge" class="unread-badge hidden">0</span>
      </button>
    </div>

    <!-- Main Content -->
    <div class="container">
      <!-- Video Tab -->
      <div id="video-tab" class="tab-content active">
        <div class="main-content">
          <!-- Video Section -->
          <div class="video-section">
            <!-- Admin Controls -->
            <div id="admin-controls" class="admin-controls hidden">
              <div class="control-box">
                <label class="control-label">Search YouTube Video</label>
                <div class="input-group">
                  <input id="youtube-search-input" type="text" placeholder="Search for videos..." class="url-input">
                  <button id="search-video-btn" class="btn btn-load">Search</button>
                </div>
                <div id="search-results" class="search-results hidden"></div>
                <div class="control-options">
                  <label class="checkbox-label">
                    <input type="checkbox" id="background-play-toggle">
                    <span>Background Play (Audio continues when tab inactive)</span>
                  </label>
                </div>
              </div>
            </div>

            <!-- Video Player -->
            <div class="video-container">
              <div id="player"></div>
              <video id="html5-player" class="hidden"></video>
              <div id="player-overlay" class="player-overlay hidden"></div>
              <div id="no-video" class="no-video">
                <svg class="video-icon" fill="currentColor" viewBox="0 0 20 20">
                  <path d="M2 6a2 2 0 012-2h6a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zM14.553 7.106A1 1 0 0014 8v4a1 1 0 00.553.894l2 1A1 1 0 0018 13V7a1 1 0 00-1.447-.894l-2 1z"/>
                </svg>
                <p>No video loaded yet</p>
              </div>
            </div>
          </div>

          <!-- Sidebar -->
          <div class="sidebar">
            <!-- Users List -->
            <div class="sidebar-section">
              <h3 class="sidebar-title">Participants</h3>
              <div id="users-list" class="users-list"></div>
            </div>

            <!-- Queue -->
            <div class="sidebar-section">
              <h3 class="sidebar-title">Queue</h3>
              <div id="queue-list" class="queue-list">
                <p class="empty-message">No videos in queue</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Chat Tab -->
      <div id="chat-tab" class="tab-content">
        <div class="chat-container">
          <div class="chat-messages" id="chat-messages">
            <div class="chat-welcome">
              <svg class="chat-welcome-icon" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/>
              </svg>
              <p>Start chatting with your friends!</p>
            </div>
          </div>
          <div class="chat-input-container">
            <input type="text" id="chat-input" class="chat-input" placeholder="Type a message..." maxlength="500">
            <button id="send-message-btn" class="btn-send">
              <svg class="send-icon" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js"></script>
</body>
</html>
